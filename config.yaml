# Novel Voice Cast 配置文件

# 小说文件
novel:
  text_path: "novels/novel.txt"        # 小说文本路径
  labels_path: "novels/labels.txt"     # 角色标注路径

# Ollama 配置（用于性别识别、情感标注）
ollama:
  base_url: "http://172.31.102.237:11434"
  model: "qwen3:4b"
  timeout: 120

# 音色克隆引擎：voxcpm
clone_engine: "voxcpm"

# 预设 TTS 引擎（备用）
preset_engine: "pyttsx3"

# 角色音频配置
# 格式：角色名 → 参考音频路径
# 不配置的角色自动根据性别选择默认音频
characters:
  # 旁白 - 用深沉男声
  "旁白": "backend/data/presets/design_male_deep.wav"

  # 主角
  "罗伦斯": "backend/data/presets/demo_male.mp3"
  "劳伦斯": "backend/data/presets/demo_male.mp3"
  "赫萝": "backend/data/presets/holo_short.wav"  # 截取前30秒

# 默认音频（根据性别）
default_audio:
  male: "backend/data/presets/design_elderly.wav"      # 其他男性
  female: "backend/data/presets/reference_speaker.wav"  # 其他女性

# 功能开关
features:
  gender_identify: true        # 自动识别性别
  emotion_label: true          # 情感标注（旁白跳过）
  denoise: false               # 音频去噪
  force_reprocess: true       # 强制重新处理情感标注（忽略已有结果）

# 输出配置
output:
  dir: "output"
  filename: "full_volume"
  format: "mp3"
  bitrate: "96k"  # 压缩率适中，音质可接受

# TTS 配置（VoxCPM）
voxcpm:
  model_path: "backend/models/VoxCPM2"
