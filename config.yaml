# Novel Voice Cast 配置文件

# 小说文件
novel:
  text_path: "novels/novel.txt"        # 小说文本路径
  labels_path: "novels/labels.txt"     # 角色标注路径

# Ollama 配置（用于性别识别、情感标注）
ollama:
  base_url: "http://172.31.102.237:11434"
  model: "qwen3:4b"
  timeout: 120

# 音色克隆引擎选择：voxcpm 或 indextts2
clone_engine: "voxcpm"  # 默认使用 VoxCPM

# 预设 TTS 引擎选择：edge-tts 或 pyttsx3
# edge-tts: 在线，音质好，需要联网
# pyttsx3: 离线，音质一般，不需要联网
preset_engine: "pyttsx3"

# 角色音频配置
# 不配置的角色自动用预设（根据性别）
characters:
  # 用音色克隆的角色
  - name: "罗伦斯"
    reference_audio: "voices/ronald.wav"
  - name: "赫萝"
    reference_audio: "voices/holo.wav"

# 功能开关
features:
  gender_identify: true        # 自动识别性别（首次运行需要）
  emotion_label: true          # 情感标注
  denoise: true                # 音频去噪

# 输出配置
output:
  dir: "output"                # 输出目录
  filename: "full_volume.wav"  # 输出文件名
  segments_dir: "segments"     # 音频片段目录

# TTS 配置
tts:
  male_voice: "zh-CN-YunxiNeural"     # edge-tts 男声
  female_voice: "zh-CN-XiaoxiaoNeural" # edge-tts 女声

# VoxCPM 配置（clone_engine: voxcpm 时使用）
# 模型下载：https://github.com/Rikorose/DeepFilterNet 或联系项目作者
# 模型结构：
#   VoxCPM2/
#   ├── audiovae.pth          (376 MB)
#   ├── config.json           (4 KB)
#   ├── model.safetensors     (4.5 GB)
#   ├── tokenizer.json        (3.6 MB)
#   └── tokenizer_config.json (5 KB)
voxcpm:
  model_path: "backend/models/VoxCPM2"

# IndexTTS2 配置（clone_engine: indextts2 时使用）
# 模型下载：https://github.com/Rikorose/DeepFilterNet 或联系项目作者
# 模型结构：
#   checkpoints/IndexTTS-2/
#   ├── bpe.model             (476 KB)
#   ├── config.yaml           (2.8 KB)
#   ├── feat1.pt              (57 KB)
#   ├── feat2.pt              (375 KB)
#   ├── gpt.pth               (3.4 GB)
#   ├── s2mel.pth             (1.2 GB)
#   └── wav2vec2bert_stats.pt (9 KB)
indextts2:
  model_path: "backend/models/checkpoints/IndexTTS-2"
  device: "cuda"  # cuda 或 cpu
